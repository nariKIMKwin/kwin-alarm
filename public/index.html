<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>케이윈 업무 지시 시스템</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="screensaver.css">
</head>

<body>

<div class="top-bar">
    <img src="logo.png" class="logo">
    <h1></h1>
</div>

<div class="buttons">

    <div class="person">
        <button onclick="callBell('김은하 실장')">김은하 실장</button>
        <div class="status-box">
            <span id="김은하 실장_in" class="status-btn active-status" onclick="setStatus('김은하 실장','in')">🟢 재실</span>
            <span id="김은하 실장_out" class="status-btn">⚪ 부재중</span>
        </div>
    </div>

    <div class="person">
        <button onclick="callBell('이유빈 과장')">이유빈 과장</button>
        <div class="status-box">
            <span id="이유빈 과장_in" class="status-btn active-status" onclick="setStatus('이유빈 과장','in')">🟢 재실</span>
            <span id="이유빈 과장_out" class="status-btn">⚪ 부재중</span>
        </div>
    </div>

    <div class="person">
        <button onclick="callBell('김나리 과장')">김나리 과장</button>
        <div class="status-box">
            <span id="김나리 과장_in" class="status-btn active-status" onclick="setStatus('김나리 과장','in')">🟢 재실</span>
            <span id="김나리 과장_out" class="status-btn">⚪ 부재중</span>
        </div>
    </div>

    <div class="person">
        <button onclick="callBell('박규용 과장')">박규용 과장</button>
        <div class="status-box">
            <span id="박규용 과장_in" class="status-btn active-status" onclick="setStatus('박규용 과장','in')">🟢 재실</span>
            <span id="박규용 과장_out" class="status-btn">⚪ 부재중</span>
        </div>
    </div>

</div>

<div id="display">대기중</div>

<div class="admin-buttons">
    <button class="cancel-btn" onclick="cancelCall()">호출 취소</button>
    <button class="ok-btn" onclick="confirmCall()">호출 확인</button>
</div>

<audio id="bellSound">
    <source src="bell.mp3" type="audio/mpeg">
</audio>

<div id="screenSaver" class="screen-saver">

    <div class="screen-content">

        <div class="screen-left">
            <img src="logo.png" class="screen-logo">

            <div class="screen-line"></div>

            <div class="screen-slogan">
                함께 움직이면<br>
                더 빠르게 도착합니다.
            </div>
        </div>

        <div class="screen-divider"></div>

        <div class="screen-right">
            <div class="screen-date" id="screenDate"></div>
            <div class="screen-time-line"></div>
            <div class="screen-time" id="screenTime"></div>
        </div>

    </div>

    <div class="screen-footer">
        KWIN Smart Work Display
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
<script src="screensaver.js"></script>

</body>
</html>
